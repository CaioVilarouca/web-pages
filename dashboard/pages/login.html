<!DOCTYPE html>
<html lang="pr-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Paleta de cor-->
  <link rel="stylesheet" href="../css/color.css">
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
  <!-- CSS -->
  <link rel="stylesheet" href="../css/login.css">
  <!-- Icon Url -->
  <link rel="shortcut icon" href="../img/logoWhite.png" type="image/x-icon">
    <title>Login</title>
</head>
<body class="body-login">
    <div class="login-box">
        <form action="">
            <div class="nav-logo">
              <img src="../img/logoBlack.png" alt="logo">
              <div class="nav-title">
                <h3><span>IGREJA</span>
                  <br>SOBRENATURAL</h3>
              </div>
            </div>
            <div class="select-box">
                <select name="#" >
                    <option value="0">Selecione a Igreja</option>
                    <option value="1">IBS - Sede</option>
                    <option value="2">IBS - Alexânia</option>
                    <option value="3">IBS - Brazlândia</option>
                    <option value="4">IBS - Lago Azul</option>
                    <option value="5">IBS - Recanto das Emas</option>
                    <option value="6">IBS - Santa Maria Sul</option>
                    <option value="7">IBS - Lunabel</option>
                    <option value="9">IBS - Boa Vista</option>
                </select>
            </div>
            <div class="input-box">
                <span class="icon"><i class="ri-mail-line"></i></span>
                <input type="email" required>
                <label>E-mail</label>
            </div>
            <div class="input-box">
                <span class="icon"><i class="ri-shield-keyhole-line"></i></span>
                <input type="password" required>
                <label>Senha</label>
            </div>
            <div class="forgot-password">
                <a href="../index.html">Esqueci a Senha?</a>
            </div>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
